```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student DevOps Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    padding:40px;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:40px;
}

.top-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    backdrop-filter: blur(8px);
}

.card h2{
    margin-bottom:18px;
    font-size:24px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:none;
    border-radius:10px;
    font-size:15px;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    background:#22c55e;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#16a34a;
}

.load-btn{
    background:#3b82f6;
    margin-top:10px;
}

.load-btn:hover{
    background:#2563eb;
}

.table-card{
    margin-top:25px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    overflow:hidden;
    border-radius:12px;
}

th{
    background:#1d4ed8;
    padding:14px;
}

td{
    padding:12px;
    text-align:center;
    background:rgba(255,255,255,0.06);
}

tr:hover td{
    background:rgba(255,255,255,0.12);
}

.msg{
    margin-top:10px;
    font-size:14px;
    color:#86efac;
}

@media(max-width:900px){
    .top-grid{
        grid-template-columns:1fr;
    }

    h1{
        font-size:30px;
    }
}
</style>

</head>
<body>

<div class="container">

<h1>🎓 Student DevOps Portal</h1>

<div class="top-grid">

<div class="card">
<h2>Add New Student</h2>

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="course" placeholder="Enter Course">
<input type="email" id="email" placeholder="Enter Email">

<button onclick="addStudent()">Add Student</button>

<div class="msg" id="msg"></div>
</div>

<div class="card">
<h2>Project Info</h2>
<p>✔ 3 Tier Architecture</p>
<p>✔ Frontend: HTML / CSS / JavaScript</p>
<p>✔ Backend: Flask API</p>
<p>✔ Deployment: Render</p>
<p>✔ DevOps Ready Project</p>

<button class="load-btn" onclick="loadStudents()">Load Students</button>
</div>

</div>

<div class="card table-card">
<h2>Student Records</h2>

<table id="studentsTable">
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Email</th>
</tr>
</table>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
```
